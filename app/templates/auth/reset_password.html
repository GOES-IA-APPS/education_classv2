<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer contraseña | Edu Registry Monolith</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body">
  <section class="auth-layout">
    <div class="auth-copy">
      <p class="muted">Recuperación de acceso</p>
      <h1>Restablecer contraseña</h1>
      <p>La nueva contraseña debe mantener las reglas fuertes del sistema.</p>
    </div>

    <form action="/access/reset-password/{{ token }}" method="post" class="card auth-card">
      <h2>Cambiar contraseña</h2>
      {% if error %}
      <div class="alert error">{{ error }}</div>
      {% endif %}
      {% if success %}
      <div class="alert success">{{ success }}</div>
      {% endif %}
      <label>Nueva contraseña<input type="password" name="password" required></label>
      <button type="submit" class="button">Actualizar contraseña</button>
      <div class="auth-links">
        <a class="text-link" href="/login">Volver al login</a>
      </div>
    </form>
  </section>
</body>
</html>
