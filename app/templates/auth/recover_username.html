<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Usuario recuperado | Sistema de Gestión Escolar</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="auth-body">
  <section class="auth-layout">
    <div class="auth-copy">
      <p class="muted">Recuperación de acceso</p>
      <h1>Resultado de recuperación</h1>
    </div>

    <div class="card auth-card">
      {% if error %}
      <div class="alert error">{{ error }}</div>
      {% else %}
      <div class="alert success">Tu usuario de acceso registrado es:</div>
      <p><strong>{{ user.email }}</strong></p>
      {% endif %}
      <div class="auth-links">
        <a class="text-link" href="/login">Ir al login</a>
      </div>
    </div>
  </section>
</body>
</html>
